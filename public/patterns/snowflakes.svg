<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="snowflakes" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="white" opacity="0"/>
      <!-- 6-arm snowflake center -->
      <g transform="translate(30,30)" opacity="0.55">
        <line x1="0" y1="-14" x2="0" y2="14" stroke="#93c5fd" stroke-width="2.5"/>
        <line x1="-12.1" y1="-7" x2="12.1" y2="7" stroke="#93c5fd" stroke-width="2.5"/>
        <line x1="-12.1" y1="7" x2="12.1" y2="-7" stroke="#93c5fd" stroke-width="2.5"/>
        <!-- Arms branches -->
        <line x1="0" y1="-14" x2="-4" y2="-10" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="0" y1="-14" x2="4" y2="-10" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="0" y1="14" x2="-4" y2="10" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="0" y1="14" x2="4" y2="10" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="-12.1" y1="-7" x2="-9.5" y2="-2.5" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="-12.1" y1="-7" x2="-7.5" y2="-10" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="12.1" y1="7" x2="9.5" y2="2.5" stroke="#93c5fd" stroke-width="1.5"/>
        <line x1="12.1" y1="7" x2="7.5" y2="10" stroke="#93c5fd" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="2.5" fill="#bfdbfe"/>
      </g>
      <!-- Small snowflakes corners -->
      <g transform="translate(0,0)" opacity="0.3">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#c7d2fe" stroke-width="1.5"/>
        <line x1="-5.2" y1="-3" x2="5.2" y2="3" stroke="#c7d2fe" stroke-width="1.5"/>
        <line x1="-5.2" y1="3" x2="5.2" y2="-3" stroke="#c7d2fe" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="1.5" fill="#c7d2fe"/>
      </g>
      <g transform="translate(60,60)" opacity="0.3">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#c7d2fe" stroke-width="1.5"/>
        <line x1="-5.2" y1="-3" x2="5.2" y2="3" stroke="#c7d2fe" stroke-width="1.5"/>
        <line x1="-5.2" y1="3" x2="5.2" y2="-3" stroke="#c7d2fe" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="1.5" fill="#c7d2fe"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#snowflakes)"/>
</svg>
