<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="clouds" width="70" height="40" patternUnits="userSpaceOnUse">
      <rect width="70" height="40" fill="white" opacity="0"/>
      <!-- Cloud shape 1 -->
      <g opacity="0.4">
        <circle cx="20" cy="22" r="10" fill="#e2e8f0"/>
        <circle cx="32" cy="18" r="12" fill="#f1f5f9"/>
        <circle cx="44" cy="22" r="9" fill="#e2e8f0"/>
        <rect x="11" y="22" width="42" height="10" fill="#f1f5f9"/>
      </g>
      <!-- Tiny cloud -->
      <g transform="translate(50,-5)" opacity="0.25">
        <circle cx="4" cy="6" r="4" fill="#cbd5e1"/>
        <circle cx="9" cy="4" r="5" fill="#e2e8f0"/>
        <circle cx="14" cy="6" r="4" fill="#cbd5e1"/>
        <rect x="0" y="6" width="18" height="5" fill="#e2e8f0"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#clouds)"/>
</svg>
