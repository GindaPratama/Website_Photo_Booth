<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="flowers" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="white" opacity="0"/>
      <!-- Main flower 5 petals -->
      <circle cx="30" cy="20" r="7" fill="#f9a8d4" opacity="0.55"/>
      <circle cx="40" cy="27" r="7" fill="#f9a8d4" opacity="0.55"/>
      <circle cx="37" cy="38" r="7" fill="#f9a8d4" opacity="0.55"/>
      <circle cx="23" cy="38" r="7" fill="#f9a8d4" opacity="0.55"/>
      <circle cx="20" cy="27" r="7" fill="#f9a8d4" opacity="0.55"/>
      <circle cx="30" cy="29" r="5" fill="#fde68a" opacity="0.8"/>
      <!-- Small flower corner tl -->
      <circle cx="3" cy="0" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="7" cy="3" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="5.5" cy="7" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="0.5" cy="7" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="-1" cy="3" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="3" cy="3.5" r="2" fill="#fde68a" opacity="0.8"/>
      <!-- Small flower corner br -->
      <circle cx="57" cy="54" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="61" cy="57" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="59.5" cy="61" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="54.5" cy="61" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="53" cy="57" r="3" fill="#86efac" opacity="0.4"/>
      <circle cx="57" cy="57.5" r="2" fill="#fde68a" opacity="0.8"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#flowers)"/>
</svg>
