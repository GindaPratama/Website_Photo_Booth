<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#001428"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <!-- Aurora rainbow border segments -->
  <rect x="0" y="0" width="15" height="2" fill="#7c00ff" rx="1"/>
  <rect x="15" y="0" width="15" height="2" fill="#00bfff" rx="1"/>
  <rect x="30" y="0" width="15" height="2" fill="#00ffaa" rx="1"/>
  <rect x="45" y="0" width="15" height="2" fill="#ff69b4" rx="1"/>
  <rect x="0" y="58" width="15" height="2" fill="#ff69b4" rx="1"/>
  <rect x="15" y="58" width="15" height="2" fill="#00ffaa" rx="1"/>
  <rect x="30" y="58" width="15" height="2" fill="#00bfff" rx="1"/>
  <rect x="45" y="58" width="15" height="2" fill="#7c00ff" rx="1"/>
  <!-- Aurora snowflake center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#7c00ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#00bfff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12.7" y1="-12.7" x2="12.7" y2="12.7" stroke="#00ffaa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12.7" y1="-12.7" x2="-12.7" y2="12.7" stroke="#ff69b4" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#1a0533"/>
    <circle cx="0" cy="0" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-18" r="3" fill="#b070ff"/>
    <circle cx="0" cy="18" r="3" fill="#ff69b4"/>
    <circle cx="-18" cy="0" r="3" fill="#00ffaa"/>
    <circle cx="18" cy="0" r="3" fill="#00bfff"/>
  </g>
  <!-- Grid lines -->
  <rect x="28.5" y="0" width="3" height="60" fill="white" opacity="0.2"/>
  <rect x="0" y="28.5" width="60" height="3" fill="white" opacity="0.2"/>
</svg>
