<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <rect width="60" height="60" rx="8" fill="#111111"/>
  <!-- Film border strips -->
  <rect x="0" y="0" width="60" height="10" rx="2" fill="#1a1a1a"/>
  <rect x="0" y="50" width="60" height="10" rx="2" fill="#1a1a1a"/>
  <!-- Sprocket holes top -->
  <rect x="4" y="2" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <rect x="15" y="2" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <rect x="38" y="2" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <rect x="49" y="2" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <!-- Sprocket holes bottom -->
  <rect x="4" y="53" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <rect x="15" y="53" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <rect x="38" y="53" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <rect x="49" y="53" width="7" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.5"/>
  <!-- Film photo area (two frames) -->
  <rect x="3" y="12" width="24" height="36" rx="1" fill="#2a2a2a"/>
  <rect x="33" y="12" width="24" height="36" rx="1" fill="#2a2a2a"/>
  <!-- Camera aperture icon in frames -->
  <circle cx="15" cy="30" r="10" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="15" cy="30" r="5" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <circle cx="45" cy="30" r="10" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="45" cy="30" r="5" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <!-- Divider -->
  <rect x="28" y="10" width="4" height="40" fill="#111"/>
</svg>
