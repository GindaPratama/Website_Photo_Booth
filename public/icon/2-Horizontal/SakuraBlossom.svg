<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#f48fb1" stroke-width="1.5"/>
  <!-- Big sakura center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f48fb1" opacity="0.85"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f06292" opacity="0.75" transform="rotate(72)"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f48fb1" opacity="0.85" transform="rotate(144)"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f06292" opacity="0.75" transform="rotate(216)"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f48fb1" opacity="0.85" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="6" fill="#fff9c4"/>
    <circle cx="0" cy="0" r="3" fill="#ff8f00"/>
  </g>
  <!-- Corner petals -->
  <ellipse cx="8" cy="8" rx="6" ry="9" fill="#f48fb1" opacity="0.5" transform="rotate(-30 8 8)"/>
  <ellipse cx="52" cy="8" rx="6" ry="9" fill="#f48fb1" opacity="0.5" transform="rotate(30 52 8)"/>
  <ellipse cx="8" cy="52" rx="6" ry="9" fill="#f06292" opacity="0.5" transform="rotate(20 8 52)"/>
  <ellipse cx="52" cy="52" rx="6" ry="9" fill="#f06292" opacity="0.5" transform="rotate(-20 52 52)"/>
</svg>
