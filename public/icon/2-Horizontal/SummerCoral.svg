    <line x1="20" y1="0" x2="24" y2="0" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="-14" x2="-17" y2="-17" stroke="#ffe082" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="14" x2="17" y2="17" stroke="#ffe082" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14" y1="14" x2="-17" y2="17" stroke="#ffe082" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="17" y2="-17" stroke="#ffe082" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Wave bottom decoration -->
  <path d="M 5 52 Q 15 47,25 52 Q 35 57,45 52 Q 55 47,60 52" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
