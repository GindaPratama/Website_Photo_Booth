<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="100%" stop-color="#ffab40"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Big sun center -->
  <g transform="translate(30,30)" filter="url(#g)">
