<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0120"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.7"/>
  <!-- Big crescent moon -->
  <g transform="translate(20,25)" filter="url(#g)">
    <circle cx="0" cy="0" r="20" fill="#fdd835" opacity="0.9"/>
    <circle cx="9" cy="-6" r="16" fill="#1a0a2e"/>
  </g>
  <!-- Big 8-star -->
  <g transform="translate(46,18)" filter="url(#g)">
    <path d="M0-14 3.5-3.5 14 0 3.5 3.5 0 14-3.5 3.5-14 0-3.5-3.5Z" fill="#e8eaf6" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#ce93d8"/>
  </g>
  <!-- Small stars -->
  <g transform="translate(42,48)" filter="url(#g)">
    <path d="M0-8 2-2 8 0 2 2 0 8-2 2-8 0-2-2Z" fill="#b39ddb" opacity="0.8"/>
  </g>
  <g transform="translate(8,44)" filter="url(#g)">
    <path d="M0-6 1.5-1.5 6 0 1.5 1.5 0 6-1.5 1.5-6 0-1.5-1.5Z" fill="#fdd835" opacity="0.7"/>
  </g>
</svg>
