<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050010"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#ff00cc" stroke-width="1.5" opacity="0.7" filter="url(#g)"/>
  <!-- Big neon star pink -->
  <g transform="translate(22,22)" filter="url(#g)">
    <path d="M0-18 4.5-4.5 18 0 4.5 4.5 0 18-4.5 4.5-18 0-4.5-4.5Z" fill="#ff00cc" opacity="0.95"/>
    <circle cx="0" cy="0" r="5" fill="#050010"/>
    <circle cx="0" cy="0" r="2.5" fill="#ff00cc"/>
  </g>
  <!-- Big neon star cyan -->
  <g transform="translate(44,40)" filter="url(#g)">
    <path d="M0-14 3.5-3.5 14 0 3.5 3.5 0 14-3.5 3.5-14 0-3.5-3.5Z" fill="#00ffff" opacity="0.95"/>
    <circle cx="0" cy="0" r="4" fill="#050010"/>
    <circle cx="0" cy="0" r="2" fill="#00ffff"/>
  </g>
  <!-- Cyan border corners -->
  <line x1="0" y1="0" x2="15" y2="0" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
  <line x1="0" y1="0" x2="0" y2="15" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="60" x2="45" y2="60" stroke="#ff00cc" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="60" x2="60" y2="45" stroke="#ff00cc" stroke-width="2" opacity="0.7"/>
</svg>
