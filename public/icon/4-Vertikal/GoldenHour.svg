    <line x1="-15.5" y1="-15.5" x2="-18" y2="-18" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15.5" y1="15.5" x2="18" y2="18" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
