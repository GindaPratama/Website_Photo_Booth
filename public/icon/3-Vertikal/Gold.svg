<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#2a1f00"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#ffd700" stroke-width="2"/>
  <!-- Big gold crown center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <!-- Crown base -->
    <rect x="-16" y="4" width="32" height="10" rx="2" fill="#ffd700"/>
    <!-- Crown peaks -->
    <path d="M -16 4 L -16 -8 L -8 4 L 0 -14 L 8 4 L 16 -8 L 16 4 Z" fill="#ffd700"/>
    <!-- Jewels on crown -->
    <circle cx="-8" cy="0" r="3" fill="#f44336" opacity="0.9"/>
    <circle cx="0" cy="-4" r="3.5" fill="#2196F3" opacity="0.9"/>
    <circle cx="8" cy="0" r="3" fill="#4CAF50" opacity="0.9"/>
    <!-- Crown shine -->
    <path d="M -14 2 L -10 -5 L -6 2" fill="none" stroke="#fffde7" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Gold sparkles -->
  <g transform="translate(10,12)" filter="url(#g)">
    <path d="M0-8 2-2 8 0 2 2 0 8-2 2-8 0-2-2Z" fill="#ffd700" opacity="0.8"/>
  </g>
  <g transform="translate(50,12)" filter="url(#g)">
    <path d="M0-8 2-2 8 0 2 2 0 8-2 2-8 0-2-2Z" fill="#ffd700" opacity="0.8"/>
  </g>
  <g transform="translate(10,48)" filter="url(#g)">
    <path d="M0-6 1.5-1.5 6 0 1.5 1.5 0 6-1.5 1.5-6 0-1.5-1.5Z" fill="#ffd700" opacity="0.7"/>
  </g>
  <g transform="translate(50,48)" filter="url(#g)">
    <path d="M0-6 1.5-1.5 6 0 1.5 1.5 0 6-1.5 1.5-6 0-1.5-1.5Z" fill="#ffd700" opacity="0.7"/>
  </g>
</svg>
