<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a2c0a"/>
      <stop offset="100%" stop-color="#6d3b0e"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#d4a054" stroke-width="2" opacity="0.7"/>
  <!-- Film strip top/bottom -->
  <rect x="0" y="0" width="60" height="9" fill="#2a1800"/>
  <rect x="0" y="51" width="60" height="9" fill="#2a1800"/>
  <!-- Sprocket holes -->
  <rect x="4" y="2" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="15" y="2" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="39" y="2" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="50" y="2" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="4" y="53" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="15" y="53" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="39" y="53" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <rect x="50" y="53" width="6" height="5" rx="1" fill="#4a2c0a" stroke="#555" stroke-width="0.5"/>
  <!-- Vintage camera center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <rect x="-16" y="-12" width="32" height="22" rx="3" fill="#8b5e2d" stroke="#d4a054" stroke-width="1.5"/>
    <circle cx="0" cy="3" r="9" fill="#2a1800" stroke="#d4a054" stroke-width="1.5"/>
    <circle cx="0" cy="3" r="6" fill="#1a0f00" stroke="#8b5e2d" stroke-width="1"/>
    <circle cx="0" cy="3" r="3" fill="#333" opacity="0.8"/>
    <!-- Viewfinder -->
    <rect x="7" y="-10" width="6" height="4" rx="1" fill="#333" stroke="#d4a054" stroke-width="0.8"/>
    <!-- Flash -->
    <rect x="-15" y="-10" width="5" height="4" rx="1" fill="#ffd740" opacity="0.7"/>
  </g>
</svg>
