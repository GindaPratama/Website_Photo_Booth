<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#ff80ab" stroke-width="1.5" opacity="0.5"/>
  <!-- Y2K style swirl snowflake center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#ff80ab" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#ff80ab" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12.7" y1="-12.7" x2="12.7" y2="12.7" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12.7" y1="-12.7" x2="-12.7" y2="12.7" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small diamonds at tips -->
    <path d="M0-18 L3-15 L0-12 L-3-15Z" fill="#ff80ab"/>
    <path d="M0 18 L3 15 L0 12 L-3 15Z" fill="#ff80ab"/>
    <path d="M-18 0 L-15 3 L-12 0 L-15-3Z" fill="#a78bfa"/>
    <path d="M 18 0 L 15 3 L 12 0 L 15-3Z" fill="#a78bfa"/>
    <circle cx="0" cy="0" r="5" fill="#ffe0f5"/>
    <circle cx="0" cy="0" r="2.5" fill="#ff80ab"/>
  </g>
  <!-- Corner stars -->
  <path d="M0-5 1.5-1.5 5 0 1.5 1.5 0 5-1.5 1.5-5 0-1.5-1.5Z" fill="#a78bfa" opacity="0.7" transform="translate(10,10)"/>
  <path d="M0-5 1.5-1.5 5 0 1.5 1.5 0 5-1.5 1.5-5 0-1.5-1.5Z" fill="#ff80ab" opacity="0.7" transform="translate(50,10)"/>
  <path d="M0-5 1.5-1.5 5 0 1.5 1.5 0 5-1.5 1.5-5 0-1.5-1.5Z" fill="#ff80ab" opacity="0.7" transform="translate(10,50)"/>
  <path d="M0-5 1.5-1.5 5 0 1.5 1.5 0 5-1.5 1.5-5 0-1.5-1.5Z" fill="#a78bfa" opacity="0.7" transform="translate(50,50)"/>
</svg>
