<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#fce4ec"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <!-- Big butterfly center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <!-- Left upper wing -->
    <ellipse cx="-10" cy="-8" rx="15" ry="12" fill="#90caf9" opacity="0.7" transform="rotate(-20 -10 -8)"/>
    <!-- Right upper wing -->
    <ellipse cx="10" cy="-8" rx="15" ry="12" fill="#f48fb1" opacity="0.7" transform="rotate(20 10 -8)"/>
    <!-- Left lower wing -->
    <ellipse cx="-8" cy="8" rx="10" ry="8" fill="#a78bfa" opacity="0.65" transform="rotate(10 -8 8)"/>
    <!-- Right lower wing -->
    <ellipse cx="8" cy="8" rx="10" ry="8" fill="#ff8a80" opacity="0.65" transform="rotate(-10 8 8)"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="2.5" ry="12" fill="#7e57c2" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="-13" r="3" fill="#7e57c2"/>
    <!-- Antennae -->
    <line x1="-1" y1="-15" x2="-7" y2="-22" stroke="#7e57c2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="1" y1="-15" x2="7" y2="-22" stroke="#7e57c2" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-7" cy="-22" r="2" fill="#7e57c2"/>
    <circle cx="7" cy="-22" r="2" fill="#7e57c2"/>
  </g>
</svg>
