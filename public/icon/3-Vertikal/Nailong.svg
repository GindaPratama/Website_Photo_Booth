<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#ffa000" stroke-width="1.5" opacity="0.5"/>
  <!-- Nailong duck/chick style - big round character -->
  <circle cx="30" cy="28" r="18" fill="#ffca28" opacity="0.95"/>
  <circle cx="30" cy="28" r="13" fill="#ffd740" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="24" cy="24" r="4" fill="white"/>
  <circle cx="23" cy="24" r="2" fill="#212121"/>
  <circle cx="36" cy="24" r="4" fill="white"/>
  <circle cx="35" cy="24" r="2" fill="#212121"/>
  <!-- Beak -->
  <ellipse cx="30" cy="31" rx="4" ry="2.5" fill="#ff8f00" opacity="0.9"/>
  <!-- Cheeks -->
  <circle cx="20" cy="30" r="3.5" fill="#ff8a80" opacity="0.5"/>
  <circle cx="40" cy="30" r="3.5" fill="#ff8a80" opacity="0.5"/>
  <!-- Wings -->
  <ellipse cx="10" cy="38" rx="8" ry="5" fill="#ffca28" opacity="0.7" transform="rotate(-20 10 38)"/>
  <ellipse cx="50" cy="38" rx="8" ry="5" fill="#ffca28" opacity="0.7" transform="rotate(20 50 38)"/>
</svg>
