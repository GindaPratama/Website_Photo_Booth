<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006994"/>
      <stop offset="100%" stop-color="#001f3f"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#26c6da" stroke-width="1.5" opacity="0.6"/>
  <!-- Big fish -->
  <g transform="translate(20,25)" filter="url(#g)">
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="#ff7043" opacity="0.9"/>
    <path d="M 16 0 L 28 -10 L 28 10 Z" fill="#ff5722" opacity="0.85"/>
    <circle cx="-6" cy="-2.5" r="3.5" fill="white"/>
    <circle cx="-5" cy="-2.5" r="1.8" fill="#212121"/>
  </g>
  <!-- Wave-->
  <path d="M 5 46 Q 15 40,25 46 Q 35 52,45 46 Q 55 40,60 46" fill="none" stroke="#26c6da" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 5 52 Q 15 46,25 52 Q 35 58,45 52 Q 55 46,60 52" fill="none" stroke="#4dd0e1" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Bubbles -->
  <circle cx="48" cy="18" r="4" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.7"/>
  <circle cx="52" cy="10" r="2.5" fill="none" stroke="#80deea" stroke-width="1.2" opacity="0.6"/>
</svg>
