<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#d7ccc8"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#c62828" stroke-width="1.5" opacity="0.5"/>
  <!-- Classic rose center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <circle cx="0" cy="-12" r="10" fill="#c62828" opacity="0.7"/>
    <circle cx="10.4" cy="-6" r="10" fill="#e53935" opacity="0.7"/>
    <circle cx="10.4" cy="6" r="10" fill="#c62828" opacity="0.7"/>
    <circle cx="0" cy="12" r="10" fill="#e53935" opacity="0.7"/>
    <circle cx="-10.4" cy="6" r="10" fill="#c62828" opacity="0.7"/>
    <circle cx="-10.4" cy="-6" r="10" fill="#e53935" opacity="0.7"/>
    <circle cx="0" cy="0" r="9" fill="#b71c1c"/>
    <circle cx="0" cy="0" r="5.5" fill="#c62828"/>
    <ellipse cx="0" cy="-3" rx="4" ry="3" fill="#ef9a9a" opacity="0.55"/>
    <!-- Leaves -->
    <ellipse cx="-15" cy="16" rx="8" ry="4" fill="#388e3c" opacity="0.7" transform="rotate(-35 -15 16)"/>
    <ellipse cx="15" cy="16" rx="8" ry="4" fill="#2e7d32" opacity="0.7" transform="rotate(35 15 16)"/>
  </g>
</svg>
