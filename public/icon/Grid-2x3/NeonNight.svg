<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#050008"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="60" height="60" rx="8" fill="url(#i)"/>
  <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#ff00cc" stroke-width="1.5" opacity="0.7" filter="url(#g)"/>
  <!-- Neon cross + diamond center -->
  <g transform="translate(30,30)" filter="url(#g)">
    <!-- Diamond outer -->
    <path d="M0-20 20 0 0 20-20 0Z" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
    <!-- Neon cross -->
    <rect x="-3" y="-18" width="6" height="36" fill="#ff00cc" rx="3" opacity="0.85"/>
    <rect x="-18" y="-3" width="36" height="6" fill="#00ffff" rx="3" opacity="0.85"/>
    <circle cx="0" cy="0" r="5" fill="#0a0010"/>
    <circle cx="0" cy="0" r="2.5" fill="#ff00cc" opacity="0.9"/>
  </g>
</svg>
