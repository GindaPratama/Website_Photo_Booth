<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <rect width="60" height="60" rx="8" fill="#1a1a1a"/>
  <!-- Film strip style icon -->
  <rect x="0" y="0" width="60" height="10" fill="#111"/>
  <rect x="0" y="50" width="60" height="10" fill="#111"/>
  <rect x="0" y="0" width="10" height="60" fill="#111"/>
  <rect x="50" y="0" width="10" height="60" fill="#111"/>
  <!-- Sprocket holes -->
  <rect x="2" y="2" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="2" y="11" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="2" y="26" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="2" y="44" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="2" y="53" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="53" y="2" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="53" y="11" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="53" y="26" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="53" y="44" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="53" y="53" width="5" height="5" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <!-- Top sprocket row -->
  <rect x="20" y="2" width="6" height="6" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="34" y="2" width="6" height="6" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="20" y="52" width="6" height="6" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <rect x="34" y="52" width="6" height="6" rx="1" fill="#333" stroke="#444" stroke-width="0.4"/>
  <!-- 3x3 photo grid -->
  <rect x="12" y="12" width="11" height="11" fill="#2a2a2a" rx="0.5"/>
  <rect x="25" y="12" width="10" height="11" fill="#2a2a2a" rx="0.5"/>
  <rect x="37" y="12" width="11" height="11" fill="#2a2a2a" rx="0.5"/>
  <rect x="12" y="25" width="11" height="10" fill="#2a2a2a" rx="0.5"/>
  <rect x="25" y="25" width="10" height="10" fill="#333" rx="0.5"/>
  <rect x="37" y="25" width="11" height="10" fill="#2a2a2a" rx="0.5"/>
  <rect x="12" y="37" width="11" height="11" fill="#2a2a2a" rx="0.5"/>
  <rect x="25" y="37" width="10" height="11" fill="#2a2a2a" rx="0.5"/>
  <rect x="37" y="37" width="11" height="11" fill="#2a2a2a" rx="0.5"/>
