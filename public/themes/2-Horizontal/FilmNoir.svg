  <rect x="1" y="22" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="1" y="34" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="1" y="46" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
