  <rect x="290" y="34" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="290" y="46" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="290" y="58" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="290" y="70" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="290" y="82" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="290" y="94" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
