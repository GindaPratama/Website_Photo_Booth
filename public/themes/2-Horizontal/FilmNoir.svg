  <rect x="1" y="70" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="1" y="82" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="1" y="94" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="1" y="106" width="9" height="7" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
