<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 125">
  <defs>
    <linearGradient id="mg-navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <filter id="mg-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Frame base -->
  <path fill-rule="evenodd" fill="url(#mg-navy)" d="
    M 0 0 H 300 V 125 H 0 Z
    M 12 12 V 113 H 146 V 12 Z
    M 154 12 V 113 H 288 V 12 Z
  "/>
  <!-- Gold border -->
  <rect x="0" y="0" width="300" height="2" fill="#c9a84c"/>
  <rect x="0" y="123" width="300" height="2" fill="#c9a84c"/>
  <rect x="0" y="0" width="2" height="125" fill="#c9a84c"/>
  <rect x="298" y="0" width="2" height="125" fill="#c9a84c"/>
  <!-- BIG corner ornaments top-left -->
  <g transform="translate(7, 7)" filter="url(#mg-glow)">
    <path d="M 0 -18 L 4 -4 L 18 0 L 4 4 L 0 18 L -4 4 L -18 0 L -4 -4 Z" fill="#ffd700" opacity="0.9"/>
  </g>
  <!-- BIG corner ornaments top-right -->
  <g transform="translate(293, 7)" filter="url(#mg-glow)">
    <path d="M 0 -18 L 4 -4 L 18 0 L 4 4 L 0 18 L -4 4 L -18 0 L -4 -4 Z" fill="#ffd700" opacity="0.9"/>
  </g>
  <!-- BIG corner ornaments bottom-left -->
  <g transform="translate(7, 118)" filter="url(#mg-glow)">
    <path d="M 0 -14 L 3.5 -3.5 L 14 0 L 3.5 3.5 L 0 14 L -3.5 3.5 L -14 0 L -3.5 -3.5 Z" fill="#ffd700" opacity="0.9"/>
  </g>
  <!-- BIG corner ornaments bottom-right -->
  <g transform="translate(293, 118)" filter="url(#mg-glow)">
    <path d="M 0 -14 L 3.5 -3.5 L 14 0 L 3.5 3.5 L 0 14 L -3.5 3.5 L -14 0 L -3.5 -3.5 Z" fill="#ffd700" opacity="0.9"/>
  </g>
  <!-- Big center divider ornament -->
  <g transform="translate(150, 62)" filter="url(#mg-glow)">
    <path d="M 0 -20 L 4.5 -4.5 L 20 0 L 4.5 4.5 L 0 20 L -4.5 4.5 L -20 0 L -4.5 -4.5 Z" fill="#ffd700" opacity="0.95"/>
    <circle cx="0" cy="0" r="5" fill="#0d1b2a"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffd700"/>
  </g>
  <!-- Inner gold frame -->
  <rect x="5" y="5" width="290" height="0.8" fill="#ffd700" opacity="0.4"/>
  <rect x="5" y="119.2" width="290" height="0.8" fill="#ffd700" opacity="0.4"/>
  <!-- Big stars on left strip -->
  <g transform="translate(7, 35)" filter="url(#mg-glow)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#ffd700" opacity="0.7"/>
  </g>
  <g transform="translate(7, 90)" filter="url(#mg-glow)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#ffd700" opacity="0.7"/>
  </g>
  <!-- Big stars on right strip -->
  <g transform="translate(293, 35)" filter="url(#mg-glow)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#ffd700" opacity="0.7"/>
  </g>
  <g transform="translate(293, 90)" filter="url(#mg-glow)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#ffd700" opacity="0.7"/>
  </g>
  <!-- Big top center star -->
  <g transform="translate(150, 7)" filter="url(#mg-glow)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#ffd700" opacity="0.8"/>
  </g>
  <!-- Divider vertical line -->
  <rect x="149.5" y="5" width="1" height="115" fill="#ffd700" opacity="0.25"/>
</svg>
