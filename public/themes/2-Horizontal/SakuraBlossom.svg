<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 125">
  <defs>
    <linearGradient id="sk-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <filter id="sk-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Frame base -->
  <path fill-rule="evenodd" fill="url(#sk-pink)" d="
    M 0 0 H 300 V 125 H 0 Z
    M 12 12 V 113 H 146 V 12 Z
    M 154 12 V 113 H 288 V 12 Z
  "/>
  <rect x="0" y="0" width="300" height="1.5" fill="#e91e7a" opacity="0.5"/>
  <rect x="0" y="123.5" width="300" height="1.5" fill="#e91e7a" opacity="0.5"/>
  <rect x="0" y="0" width="1.5" height="125" fill="#e91e7a" opacity="0.5"/>
  <rect x="298.5" y="0" width="1.5" height="125" fill="#e91e7a" opacity="0.5"/>

  <!-- BIG sakura top-left (radius 14px petals) -->
  <g transform="translate(8, 7)" filter="url(#sk-glow)">
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f48fb1" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f48fb1" opacity="0.75" transform="rotate(72)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f06292" opacity="0.80" transform="rotate(144)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f48fb1" opacity="0.75" transform="rotate(216)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f06292" opacity="0.80" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5" fill="#ffe0b2" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#ff8f00"/>
  </g>
  <!-- BIG sakura top-right -->
  <g transform="translate(292, 7)" filter="url(#sk-glow)">
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f48fb1" opacity="0.85" transform="rotate(20)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f48fb1" opacity="0.75" transform="rotate(92)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f06292" opacity="0.80" transform="rotate(164)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f48fb1" opacity="0.75" transform="rotate(236)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="13" fill="#f06292" opacity="0.80" transform="rotate(308)"/>
    <circle cx="0" cy="0" r="5" fill="#ffe0b2" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#ff8f00"/>
  </g>
  <!-- BIG sakura bottom-left -->
  <g transform="translate(8, 118)" filter="url(#sk-glow)">
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.85" transform="rotate(10)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.75" transform="rotate(82)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.80" transform="rotate(154)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.75" transform="rotate(226)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.80" transform="rotate(298)"/>
    <circle cx="0" cy="0" r="4.5" fill="#ffe0b2" opacity="0.9"/>
    <circle cx="0" cy="0" r="2" fill="#ff8f00"/>
  </g>
  <!-- BIG sakura bottom-right -->
  <g transform="translate(292, 118)" filter="url(#sk-glow)">
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.85" transform="rotate(30)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.75" transform="rotate(102)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.80" transform="rotate(174)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.75" transform="rotate(246)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.80" transform="rotate(318)"/>
    <circle cx="0" cy="0" r="4.5" fill="#ffe0b2" opacity="0.9"/>
    <circle cx="0" cy="0" r="2" fill="#ff8f00"/>
  </g>
  <!-- Center divider big sakura -->
  <g transform="translate(150, 62)" filter="url(#sk-glow)">
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.75" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.80" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.75" transform="rotate(216)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.80" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4.5" fill="#ffe0b2" opacity="0.9"/>
    <circle cx="0" cy="0" r="2" fill="#ff8f00"/>
  </g>
  <!-- Falling petals scattered -->
  <ellipse cx="60" cy="7" rx="5" ry="8" fill="#f48fb1" opacity="0.5" transform="rotate(-20 60 7)"/>
  <ellipse cx="240" cy="7" rx="5" ry="8" fill="#f48fb1" opacity="0.5" transform="rotate(15 240 7)"/>
  <ellipse cx="60" cy="118" rx="5" ry="8" fill="#f48fb1" opacity="0.5" transform="rotate(20 60 118)"/>
  <ellipse cx="240" cy="118" rx="5" ry="8" fill="#f48fb1" opacity="0.5" transform="rotate(-15 240 118)"/>
  <!-- Divider line -->
  <rect x="149.5" y="8" width="1" height="109" fill="#f48fb1" opacity="0.25"/>
</svg>
