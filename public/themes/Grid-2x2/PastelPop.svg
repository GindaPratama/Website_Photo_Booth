<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
<defs>
  <linearGradient id="pp-bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fce4ec"/>
    <stop offset="50%" stop-color="#f3e5f5"/>
    <stop offset="100%" stop-color="#e8eaf6"/>
  </linearGradient>
  <filter id="pp-glow">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<path fill-rule="evenodd" fill="url(#pp-bg)" d="
  M 0 0 H 240 V 240 H 0 Z
  M 12 12 V 117 H 117 V 12 Z
  M 123 12 V 117 H 228 V 12 Z
  M 12 123 V 228 H 117 V 123 Z
  M 123 123 V 228 H 228 V 123 Z
"/>
<!-- Colorful quadrant corner fills -->
<rect x="0" y="0" width="12" height="12" fill="#f48fb1" opacity="0.7"/>
<rect x="228" y="0" width="12" height="12" fill="#ce93d8" opacity="0.7"/>
<rect x="0" y="228" width="12" height="12" fill="#90caf9" opacity="0.7"/>
<rect x="228" y="228" width="12" height="12" fill="#a5d6a7" opacity="0.7"/>
<!-- Borders per side -->
<rect x="0" y="0" width="240" height="2" fill="#ec407a" opacity="0.6"/>
<rect x="0" y="238" width="240" height="2" fill="#ab47bc" opacity="0.6"/>
<rect x="0" y="0" width="2" height="240" fill="#42a5f5" opacity="0.6"/>
<rect x="238" y="0" width="2" height="240" fill="#66bb6a" opacity="0.6"/>

<!-- BIG flower top-left (pink) -->
<g transform="translate(7, 7)" filter="url(#pp-glow)">
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.8"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.7" transform="rotate(72)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.8" transform="rotate(144)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f06292" opacity="0.7" transform="rotate(216)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#f48fb1" opacity="0.8" transform="rotate(288)"/>
  <circle cx="0" cy="0" r="5" fill="#fff9c4"/>
  <circle cx="0" cy="0" r="2.5" fill="#f9a825"/>
</g>
<!-- BIG flower top-right (purple) -->
<g transform="translate(233, 7)" filter="url(#pp-glow)">
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#ce93d8" opacity="0.8"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#ba68c8" opacity="0.7" transform="rotate(72)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#ce93d8" opacity="0.8" transform="rotate(144)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#ba68c8" opacity="0.7" transform="rotate(216)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#ce93d8" opacity="0.8" transform="rotate(288)"/>
  <circle cx="0" cy="0" r="5" fill="#fff9c4"/>
  <circle cx="0" cy="0" r="2.5" fill="#f9a825"/>
</g>
<!-- BIG flower bottom-left (blue) -->
<g transform="translate(7, 233)" filter="url(#pp-glow)">
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#90caf9" opacity="0.8"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#64b5f6" opacity="0.7" transform="rotate(72)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#90caf9" opacity="0.8" transform="rotate(144)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#64b5f6" opacity="0.7" transform="rotate(216)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#90caf9" opacity="0.8" transform="rotate(288)"/>
  <circle cx="0" cy="0" r="5" fill="#fff9c4"/>
  <circle cx="0" cy="0" r="2.5" fill="#f9a825"/>
</g>
<!-- BIG flower bottom-right (green) -->
<g transform="translate(233, 233)" filter="url(#pp-glow)">
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#a5d6a7" opacity="0.8"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#81c784" opacity="0.7" transform="rotate(72)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#a5d6a7" opacity="0.8" transform="rotate(144)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#81c784" opacity="0.7" transform="rotate(216)"/>
  <ellipse cx="0" cy="-12" rx="7" ry="11" fill="#a5d6a7" opacity="0.8" transform="rotate(288)"/>
  <circle cx="0" cy="0" r="5" fill="#fff9c4"/>
  <circle cx="0" cy="0" r="2.5" fill="#f9a825"/>
</g>
<!-- Center: Big star -->
<g transform="translate(120, 120)" filter="url(#pp-glow)">
  <path d="M 0 -14 L 3.5 -3.5 L 14 0 L 3.5 3.5 L 0 14 L -3.5 3.5 L -14 0 L -3.5 -3.5 Z" fill="#f48fb1" opacity="0.8"/>
  <path d="M 0 -9 L 2.5 -2.5 L 9 0 L 2.5 2.5 L 0 9 L -2.5 2.5 L -9 0 L -2.5 -2.5 Z" fill="white" opacity="0.8"/>
</g>
<!-- Mid borders: big round dots -->
<circle cx="120" cy="7" r="7" fill="#f48fb1" opacity="0.6"/>
<circle cx="120" cy="233" r="7" fill="#ce93d8" opacity="0.6"/>
<circle cx="7" cy="120" r="7" fill="#90caf9" opacity="0.6"/>
<circle cx="233" cy="120" r="7" fill="#a5d6a7" opacity="0.6"/>
<!-- Grid lines -->
<rect x="117.5" y="2" width="5" height="236" fill="white" opacity="0.35"/>
<rect x="2" y="117.5" width="236" height="5" fill="white" opacity="0.35"/>
</svg>
