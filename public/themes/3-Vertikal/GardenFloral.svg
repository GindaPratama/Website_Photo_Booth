  <g transform="translate(173, 316)">
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#ffca28" opacity="0.7" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#ffa000" opacity="0.7" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="3" fill="#f57f17"/>
