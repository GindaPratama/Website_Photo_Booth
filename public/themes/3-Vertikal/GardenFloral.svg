  <g transform="translate(7, 254)">
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ffca28" opacity="0.75"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ffa000" opacity="0.65" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ffca28" opacity="0.75" transform="rotate(120)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ffa000" opacity="0.65" transform="rotate(180)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ffca28" opacity="0.75" transform="rotate(240)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ffa000" opacity="0.65" transform="rotate(300)"/>
