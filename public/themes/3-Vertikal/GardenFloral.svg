    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ef5350" opacity="0.75" transform="rotate(144)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#c62828" opacity="0.65" transform="rotate(216)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ef5350" opacity="0.75" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5.5" fill="#fff9c4"/>
    <circle cx="0" cy="0" r="2.5" fill="#f57f17"/>
  </g>

  <!-- Big flower bottom-left -->
  <g transform="translate(8, 379)">
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#66bb6a" opacity="0.8"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#4caf50" opacity="0.7" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#66bb6a" opacity="0.8" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#4caf50" opacity="0.7" transform="rotate(216)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#66bb6a" opacity="0.8" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5" fill="#fff9c4"/>
    <circle cx="0" cy="0" r="2.5" fill="#f57f17"/>
