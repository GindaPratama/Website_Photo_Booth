  <!-- Big flower bottom-right -->
  <g transform="translate(172, 379)">
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ab47bc" opacity="0.8" transform="rotate(20)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#9c27b0" opacity="0.7" transform="rotate(92)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ab47bc" opacity="0.8" transform="rotate(164)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#9c27b0" opacity="0.7" transform="rotate(236)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ab47bc" opacity="0.8" transform="rotate(308)"/>
    <circle cx="0" cy="0" r="5" fill="#fff9c4"/>
    <circle cx="0" cy="0" r="2.5" fill="#f57f17"/>
  </g>

  <!-- Mid-strip leaf sprites -->
  <g transform="translate(7, 70)">
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#81c784" opacity="0.7" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#4caf50" opacity="0.7" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="3" fill="#388e3c"/>
  </g>
  <g transform="translate(173, 193)">
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#81c784" opacity="0.7" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#4caf50" opacity="0.7" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="3" fill="#388e3c"/>
  </g>
  <g transform="translate(7, 316)">
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#f06292" opacity="0.7" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-10" rx="6" ry="9" fill="#e91e63" opacity="0.7" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="3" fill="#c62828"/>
