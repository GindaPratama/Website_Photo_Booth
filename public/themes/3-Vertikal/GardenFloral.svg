  <g transform="translate(7, 131)" filter="url(#gf-glow)">
    <!-- Vertical stem -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#388e3c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leaves -->
    <ellipse cx="-9" cy="-12" rx="9" ry="5" fill="#66bb6a" opacity="0.8" transform="rotate(-40 -9 -12)"/>
    <ellipse cx="-9" cy="0" rx="8" ry="4.5" fill="#4caf50" opacity="0.8" transform="rotate(-35 -9 0)"/>
    <ellipse cx="-8" cy="12" rx="7" ry="4" fill="#66bb6a" opacity="0.8" transform="rotate(-30 -8 12)"/>
    <!-- Right leaves -->
    <ellipse cx="9" cy="-8" rx="9" ry="5" fill="#4caf50" opacity="0.8" transform="rotate(40 9 -8)"/>
    <ellipse cx="9" cy="4" rx="8" ry="4.5" fill="#66bb6a" opacity="0.8" transform="rotate(35 9 4)"/>
    <ellipse cx="8" cy="15" rx="7" ry="4" fill="#4caf50" opacity="0.8" transform="rotate(30 8 15)"/>
