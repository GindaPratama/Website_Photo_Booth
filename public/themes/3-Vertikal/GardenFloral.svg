<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 387">
  <defs>
    <linearGradient id="gf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <filter id="gf-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path fill-rule="evenodd" fill="url(#gf-bg)" d="
    M 0 0 H 180 V 387 H 0 Z
    M 12 12 V 129 H 168 V 12 Z
    M 12 135 V 252 H 168 V 135 Z
    M 12 258 V 375 H 168 V 258 Z
  "/>
  <rect x="0" y="0" width="180" height="1.5" fill="#388e3c" opacity="0.5"/>
  <rect x="0" y="385.5" width="180" height="1.5" fill="#388e3c" opacity="0.5"/>
  <rect x="0" y="0" width="1.5" height="387" fill="#388e3c" opacity="0.5"/>
  <rect x="178.5" y="0" width="1.5" height="387" fill="#388e3c" opacity="0.5"/>

  <!-- BIG flower top-left (petal radius 16px) -->
  <g transform="translate(8, 8)">
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f06292" opacity="0.7"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#e91e63" opacity="0.6" transform="rotate(72)"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f48fb1" opacity="0.7" transform="rotate(144)"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#e91e63" opacity="0.6" transform="rotate(216)"/>
    <ellipse cx="0" cy="-16" rx="9" ry="14" fill="#f06292" opacity="0.7" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="6" fill="#fff9c4"/>
    <circle cx="0" cy="0" r="3" fill="#f9a825"/>
  </g>
  <!-- BIG flower top-right -->
  <g transform="translate(172, 8)">
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ab47bc" opacity="0.7"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#9c27b0" opacity="0.6" transform="rotate(72)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#ce93d8" opacity="0.7" transform="rotate(144)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="12" fill="#9c27b0" opacity="0.6" transform="rotate(216)"/>
