<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 387">
  <defs>
    <linearGradient id="ow-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006994"/>
      <stop offset="100%" stop-color="#001f3f"/>
    </linearGradient>
    <filter id="ow-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path fill-rule="evenodd" fill="url(#ow-bg)" d="
    M 0 0 H 180 V 387 H 0 Z
    M 12 12 V 129 H 168 V 12 Z
    M 12 135 V 252 H 168 V 135 Z
    M 12 258 V 375 H 168 V 258 Z
  "/>
  <rect x="0" y="0" width="180" height="1.5" fill="#26c6da" opacity="0.6"/>
  <rect x="0" y="385.5" width="180" height="1.5" fill="#26c6da" opacity="0.6"/>
  <rect x="0" y="0" width="1.5" height="387" fill="#26c6da" opacity="0.6"/>
  <rect x="178.5" y="0" width="1.5" height="387" fill="#26c6da" opacity="0.6"/>

  <!-- BIG fish top-left -->
  <g transform="translate(7, 8)" filter="url(#ow-glow)">
    <!-- Fish body -->
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#ff7043" opacity="0.9"/>
    <!-- Fish tail -->
    <path d="M 14 0 L 24 -9 L 24 9 Z" fill="#ff5722" opacity="0.85"/>
    <!-- Eye -->
    <circle cx="-6" cy="-2" r="3" fill="white"/>
    <circle cx="-5" cy="-2" r="1.5" fill="#212121"/>
    <!-- Fins -->
    <path d="M 0 -9 Q -5 -16, 5 -13" fill="none" stroke="#ff8a65" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- BIG anchor right top -->
  <g transform="translate(173, 8)" filter="url(#ow-glow)">
    <!-- Anchor rod -->
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#b0bec5" stroke-width="3" stroke-linecap="round"/>
    <!-- Anchor cross bar -->
    <line x1="-12" y1="-12" x2="12" y2="-12" stroke="#b0bec5" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Anchor ring top -->
    <circle cx="0" cy="-16" r="4" fill="none" stroke="#b0bec5" stroke-width="2.5"/>
    <!-- Anchor curved arms -->
    <path d="M 0 16 Q -14 10, -12 4" fill="none" stroke="#b0bec5" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 16 Q 14 10, 12 4" fill="none" stroke="#b0bec5" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-12" cy="4" r="3" fill="#78909c"/>
    <circle cx="12" cy="4" r="3" fill="#78909c"/>
  </g>

  <!-- BIG wave decoration between photo 1-2 left -->
  <g transform="translate(7, 131)" filter="url(#ow-glow)">
    <!-- Big wave paths stacked -->
    <path d="M -9 -8 Q -4 -15, 0 -8 Q 4 -1, 9 -8" fill="none" stroke="#26c6da" stroke-width="3" stroke-linecap="round"/>
    <path d="M -9 0 Q -4 -7, 0 0 Q 4 7, 9 0" fill="none" stroke="#4dd0e1" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -9 8 Q -4 1, 0 8 Q 4 15, 9 8" fill="none" stroke="#26c6da" stroke-width="3" stroke-linecap="round"/>
    <!-- Bubble dots -->
    <circle cx="-6" cy="-18" r="3.5" fill="#80deea" opacity="0.7"/>
    <circle cx="5" cy="-22" r="2.5" fill="#80deea" opacity="0.6"/>
    <circle cx="0" cy="-26" r="2" fill="#80deea" opacity="0.5"/>
  </g>
  <!-- Big wave right between photo 1-2 -->
  <g transform="translate(173, 131)" filter="url(#ow-glow)">
    <path d="M -9 -8 Q -4 -15, 0 -8 Q 4 -1, 9 -8" fill="none" stroke="#26c6da" stroke-width="3" stroke-linecap="round"/>
    <path d="M -9 0 Q -4 -7, 0 0 Q 4 7, 9 0" fill="none" stroke="#4dd0e1" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -9 8 Q -4 1, 0 8 Q 4 15, 9 8" fill="none" stroke="#26c6da" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-6" cy="-18" r="3.5" fill="#80deea" opacity="0.7"/>
    <circle cx="5" cy="-22" r="2.5" fill="#80deea" opacity="0.6"/>
    <circle cx="0" cy="-26" r="2" fill="#80deea" opacity="0.5"/>
  </g>

  <!-- BIG fish facing right left-strip mid -->
  <g transform="translate(7, 193)" filter="url(#ow-glow)">
    <ellipse cx="0" cy="0" rx="12" ry="7.5" fill="#26c6da" opacity="0.85"/>
    <path d="M 12 0 L 20 -7 L 20 7 Z" fill="#00acc1" opacity="0.8"/>
    <circle cx="-4" cy="-1.5" r="2.5" fill="white"/>
    <circle cx="-3" cy="-1.5" r="1.2" fill="#212121"/>
  </g>

  <!-- BIG anchor left between photo 2-3 -->
  <g transform="translate(7, 254)" filter="url(#ow-glow)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#cfd8dc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#cfd8dc" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-14" r="3.5" fill="none" stroke="#cfd8dc" stroke-width="2.5"/>
    <path d="M 0 14 Q -12 9, -10 3" fill="none" stroke="#cfd8dc" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 14 Q 12 9, 10 3" fill="none" stroke="#cfd8dc" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-10" cy="3" r="2.5" fill="#90a4ae"/>
    <circle cx="10" cy="3" r="2.5" fill="#90a4ae"/>
  </g>
  <!-- BIG fish right between photo 2-3 -->
  <g transform="translate(173, 254)" filter="url(#ow-glow)">
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="#ff8a65" opacity="0.85"/>
    <path d="M -13 0 L -22 -8 L -22 8 Z" fill="#ff7043" opacity="0.8"/>
    <circle cx="5" cy="-2" r="2.5" fill="white"/>
    <circle cx="6" cy="-2" r="1.2" fill="#212121"/>
    <path d="M 0 -8 Q 5 -14, -3 -11" fill="none" stroke="#ffab91" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- BIG wave right mid -->
  <g transform="translate(173, 193)" filter="url(#ow-glow)">
    <path d="M -9 -6 Q -4 -13, 0 -6 Q 4 1, 9 -6" fill="none" stroke="#26c6da" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -9 3 Q -4 -4, 0 3 Q 4 10, 9 3" fill="none" stroke="#4dd0e1" stroke-width="2" stroke-linecap="round"/>
    <circle cx="3" cy="-16" r="3" fill="#80deea" opacity="0.65"/>
    <circle cx="-5" cy="-20" r="2" fill="#80deea" opacity="0.55"/>
  </g>

  <!-- BIG fish bottom corners -->
  <g transform="translate(7, 379)" filter="url(#ow-glow)">
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="#ff7043" opacity="0.8"/>
    <path d="M 13 0 L 22 -7 L 22 7 Z" fill="#ff5722" opacity="0.75"/>
    <circle cx="-4" cy="-2" r="2.5" fill="white"/>
    <circle cx="-3" cy="-2" r="1" fill="#212121"/>
  </g>
  <g transform="translate(173, 379)" filter="url(#ow-glow)">
    <ellipse cx="0" cy="0" rx="11" ry="7" fill="#26c6da" opacity="0.8"/>
    <path d="M -11 0 L -19 -6 L -19 6 Z" fill="#00acc1" opacity="0.75"/>
    <circle cx="4" cy="-1.5" r="2.5" fill="white"/>
    <circle cx="5" cy="-1.5" r="1" fill="#212121"/>
  </g>

  <!-- Mid panels big wave left-right -->
  <g transform="translate(7, 316)" filter="url(#ow-glow)">
    <path d="M -8 -5 Q -4 -12, 0 -5 Q 4 2, 8 -5" fill="none" stroke="#26c6da" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -8 5 Q -4 -2, 0 5 Q 4 12, 8 5" fill="none" stroke="#4dd0e1" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-16" r="3" fill="#80deea" opacity="0.65"/>
  </g>
  <g transform="translate(173, 316)" filter="url(#ow-glow)">
    <path d="M -8 -5 Q -4 -12, 0 -5 Q 4 2, 8 -5" fill="none" stroke="#26c6da" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -8 5 Q -4 -2, 0 5 Q 4 12, 8 5" fill="none" stroke="#4dd0e1" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-16" r="3" fill="#80deea" opacity="0.65"/>
  </g>
  <!-- Big bubbles top mid -->
  <g transform="translate(7, 70)" filter="url(#ow-glow)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#80deea" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-12" r="5" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.45"/>
  </g>
  <g transform="translate(173, 70)" filter="url(#ow-glow)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#80deea" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-12" r="5" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.45"/>
  </g>
</svg>
