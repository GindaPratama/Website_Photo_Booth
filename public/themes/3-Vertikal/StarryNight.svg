<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 387">
  <defs>
    <linearGradient id="sn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <filter id="sn-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path fill-rule="evenodd" fill="url(#sn-bg)" d="
    M 0 0 H 180 V 387 H 0 Z
    M 12 12 V 129 H 168 V 12 Z
    M 12 135 V 252 H 168 V 135 Z
    M 12 258 V 375 H 168 V 258 Z
  "/>
  <!-- Border -->
  <rect x="0" y="0" width="180" height="1.5" fill="#5c6bc0" opacity="0.7"/>
  <rect x="0" y="385.5" width="180" height="1.5" fill="#5c6bc0" opacity="0.7"/>
  <rect x="0" y="0" width="1.5" height="387" fill="#5c6bc0" opacity="0.7"/>
  <rect x="178.5" y="0" width="1.5" height="387" fill="#5c6bc0" opacity="0.7"/>

  <!-- BIG crescent moon top-left -->
  <g transform="translate(8, 8)" filter="url(#sn-glow)">
    <circle cx="0" cy="0" r="18" fill="#fdd835" opacity="0.9"/>
    <circle cx="8" cy="-6" r="14" fill="#0d1b2a"/>
    <circle cx="0" cy="0" r="5" fill="#fff176" opacity="0.9"/>
  </g>
  <!-- BIG 8-point star top-right -->
  <g transform="translate(172, 8)" filter="url(#sn-glow)">
    <path d="M 0 -18 L 4.5 -4.5 L 18 0 L 4.5 4.5 L 0 18 L -4.5 4.5 L -18 0 L -4.5 -4.5 Z" fill="#e8eaf6" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#c5cae9"/>
  </g>

  <!-- BIG snowflake-star left side between photo1-2 -->
  <g transform="translate(7, 131)" filter="url(#sn-glow)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#7986cb" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#7986cb" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12.7" y1="-12.7" x2="12.7" y2="12.7" stroke="#5c6bc0" stroke-width="2" stroke-linecap="round"/>
    <line x1="12.7" y1="-12.7" x2="-12.7" y2="12.7" stroke="#5c6bc0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#3949ab"/>
    <circle cx="0" cy="0" r="2.5" fill="#c5cae9"/>
    <circle cx="0" cy="-18" r="3" fill="#c5cae9"/>
    <circle cx="0" cy="18" r="3" fill="#c5cae9"/>
    <circle cx="-18" cy="0" r="3" fill="#c5cae9"/>
    <circle cx="18" cy="0" r="3" fill="#c5cae9"/>
  </g>

  <!-- BIG moon phase center-left (between photo 1 and 2) -->
  <g transform="translate(7, 70)" filter="url(#sn-glow)">
    <path d="M 0 -14 A 14 14 0 0 0 0 14 A 7 14 0 0 1 0 -14 Z" fill="#fdd835" opacity="0.9"/>
  </g>

  <!-- BIG snowflake right side between photo1-2 -->
  <g transform="translate(173, 131)" filter="url(#sn-glow)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#7986cb" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#7986cb" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12.7" y1="-12.7" x2="12.7" y2="12.7" stroke="#5c6bc0" stroke-width="2" stroke-linecap="round"/>
    <line x1="12.7" y1="-12.7" x2="-12.7" y2="12.7" stroke="#5c6bc0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#3949ab"/>
    <circle cx="0" cy="0" r="2.5" fill="#c5cae9"/>
    <circle cx="0" cy="-18" r="3" fill="#c5cae9"/>
    <circle cx="0" cy="18" r="3" fill="#c5cae9"/>
    <circle cx="-18" cy="0" r="3" fill="#c5cae9"/>
    <circle cx="18" cy="0" r="3" fill="#c5cae9"/>
  </g>

  <!-- BIG snowflake left between photo2-3 -->
  <g transform="translate(7, 254)" filter="url(#sn-glow)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#9fa8da" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#9fa8da" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-11.3" y1="-11.3" x2="11.3" y2="11.3" stroke="#7986cb" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="11.3" y1="-11.3" x2="-11.3" y2="11.3" stroke="#7986cb" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#3949ab"/>
    <circle cx="0" cy="0" r="2" fill="#c5cae9"/>
    <circle cx="0" cy="-16" r="2.5" fill="#c5cae9"/>
    <circle cx="0" cy="16" r="2.5" fill="#c5cae9"/>
    <circle cx="-16" cy="0" r="2.5" fill="#c5cae9"/>
    <circle cx="16" cy="0" r="2.5" fill="#c5cae9"/>
  </g>
  <!-- BIG snowflake right between photo2-3 -->
  <g transform="translate(173, 254)" filter="url(#sn-glow)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#9fa8da" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#9fa8da" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-11.3" y1="-11.3" x2="11.3" y2="11.3" stroke="#7986cb" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="11.3" y1="-11.3" x2="-11.3" y2="11.3" stroke="#7986cb" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#3949ab"/>
    <circle cx="0" cy="0" r="2" fill="#c5cae9"/>
    <circle cx="0" cy="-16" r="2.5" fill="#c5cae9"/>
    <circle cx="0" cy="16" r="2.5" fill="#c5cae9"/>
    <circle cx="-16" cy="0" r="2.5" fill="#c5cae9"/>
    <circle cx="16" cy="0" r="2.5" fill="#c5cae9"/>
  </g>

  <!-- BIG star bottom-left corner -->
  <g transform="translate(8, 379)" filter="url(#sn-glow)">
    <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z" fill="#e8eaf6" opacity="0.9"/>
    <circle cx="0" cy="0" r="3.5" fill="#3949ab"/>
  </g>
  <!-- BIG crescent bottom-right -->
  <g transform="translate(172, 379)" filter="url(#sn-glow)">
    <circle cx="0" cy="0" r="16" fill="#fdd835" opacity="0.85"/>
    <circle cx="7" cy="-5" r="12" fill="#1a237e"/>
    <circle cx="0" cy="0" r="4" fill="#fff176" opacity="0.85"/>
  </g>

  <!-- Big scattered stars mid-panels -->
  <g transform="translate(173, 70)" filter="url(#sn-glow)">
    <path d="M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z" fill="#c5cae9" opacity="0.75"/>
  </g>
  <g transform="translate(7, 193)" filter="url(#sn-glow)">
    <path d="M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z" fill="#c5cae9" opacity="0.75"/>
  </g>
  <g transform="translate(173, 316)" filter="url(#sn-glow)">
    <path d="M 0 -14 L 3.5 -3.5 L 14 0 L 3.5 3.5 L 0 14 L -3.5 3.5 L -14 0 L -3.5 -3.5 Z" fill="#fdd835" opacity="0.75"/>
  </g>
  <g transform="translate(7, 316)" filter="url(#sn-glow)">
    <path d="M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z" fill="#c5cae9" opacity="0.7"/>
  </g>
</svg>
