  <circle cx="0" cy="0" r="5" fill="#c62828"/>
  <ellipse cx="0" cy="-2" rx="4" ry="3" fill="#e57373" opacity="0.6"/>
  <ellipse cx="-15" cy="15" rx="8" ry="4" fill="#388e3c" opacity="0.7" transform="rotate(-35 -15 15)"/>
